---
- name: Perform Vikunja installation tasks
  when: vikunja_enabled | bool
  tags:
    - setup-all
    - setup-vikunja
    - install-all
    - install-vikunja
  block:
    - name: Validate Vikunja configuration
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/validate_config.yml"
    - name: Install Vikunja
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/install.yml"

- name: Perform Vikunja CLI command tasks
  when: vikunja_enabled | bool
  tags:
    - cli-vikunja
  block:
    - name: Run Vikunja CLI command
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/cli.yml"

- name: Perform tasks to add users automatically to Vikunja
  when: vikunja_enabled | bool
  tags:
    - ensure-vikunja-users-created
    - ensure-users-created
  block:
    - name: Add users to Vikunja automatically
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/create_users_auto.yml"

- name: Perform tasks to add users manually to Vikunja
  when: vikunja_enabled | bool
  tags:
    - create-user-vikunja
  block:
    - name: Add users to Vikunja manually
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/create_user_manual.yml"

- name: Perform Vikunja uninstallation tasks
  when: not vikunja_enabled | bool
  tags:
    - setup-all
    - setup-vikunja
  block:
    - name: Uninstall Vikunja
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/uninstall.yml"
