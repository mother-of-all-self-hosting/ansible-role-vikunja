---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "vikunja_environment_variables_smtp_enabled", "new": "vikunja_mailer_enabled" }

- name: Fail if required Vikunja settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - vikunja_uid
    - vikunja_gid
    - vikunja_hostname
    - vikunja_path_prefix
    - vikunja_container_network
    - vikunja_database_type
    - vikunja_environment_variables_service_jwtsecret

- name: Fail if Vikunja database type is invalid
  ansible.builtin.fail:
    msg: >-
      vikunja_database_type must be 'mysql', 'postgres', or 'sqlite'.
  when: "vikunja_database_type not in ['mysql', 'postgres', 'sqlite']"

- name: Run if Vikunja + MySQL integration is enabled
  when: vikunja_database_type == 'mysql'
  block:
    - name: Fail if required Vikunja + MySQL integration settings not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`) when `vikunja_database_type` is `mysql`
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - vikunja_database_mysql_password

    - name: Fail if MySQL socket host path for Vikunja is missing when Unix socket is enabled
      ansible.builtin.fail:
        msg: >-
          You need to define `vikunja_database_mysql_socket_path_host` when `vikunja_database_type` is `mysql`
          and `vikunja_database_mysql_socket_enabled` is `true`.
      when: >-
        vikunja_database_mysql_socket_enabled and
        vikunja_database_mysql_socket_path_host | string | length == 0

    - name: Fail if MySQL hostname for Vikunja is missing when Unix socket is disabled
      ansible.builtin.fail:
        msg: >-
          You need to define `vikunja_database_mysql_hostname` when `vikunja_database_type` is `mysql`
          and `vikunja_database_mysql_socket_enabled` is `false`.
      when: >-
        not vikunja_database_mysql_socket_enabled and
        vikunja_database_mysql_hostname | string | length == 0

- name: Run if Vikunja + Postgres integration is enabled
  when: vikunja_database_type == 'postgres'
  block:
    - name: Fail if required Vikunja + Postgres integration settings not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`) when `vikunja_database_type` is `postgres`
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - vikunja_database_postgres_password

    - name: Fail if Postgres socket host path for Vikunja is missing when Unix socket is enabled
      ansible.builtin.fail:
        msg: >-
          You need to define `vikunja_database_postgres_socket_path_host` when `vikunja_database_type` is `postgres`
          and `vikunja_database_postgres_socket_enabled` is `true`.
      when: >-
        vikunja_database_postgres_socket_enabled and
        vikunja_database_postgres_socket_path_host | string | length == 0

    - name: Fail if Postgres hostname for Vikunja is missing when Unix socket is disabled
      ansible.builtin.fail:
        msg: >-
          You need to define `vikunja_database_postgres_hostname` when `vikunja_database_type` is `postgres`
          and `vikunja_database_postgres_socket_enabled` is `false`.
      when: >-
        not vikunja_database_postgres_socket_enabled and
        vikunja_database_postgres_hostname | string | length == 0

- name: Run if Vikunja + Redis integration is enabled
  when: vikunja_environment_variables_redis_enabled | bool
  block:
    - name: Fail if Redis socket host path for Vikunja is missing when Unix socket is enabled
      ansible.builtin.fail:
        msg: >-
          You need to define `vikunja_redis_socket_path_host` when `vikunja_environment_variables_redis_enabled` is `true`
          and `vikunja_redis_socket_enabled` is `true`.
      when: >-
        vikunja_redis_socket_enabled and
        vikunja_redis_socket_path_host | string | length == 0

    - name: Fail if Redis hostname for Vikunja is missing when Unix socket is disabled
      ansible.builtin.fail:
        msg: >-
          You need to define `vikunja_redis_hostname` when `vikunja_environment_variables_redis_enabled` is `true`
          and `vikunja_redis_socket_enabled` is `false`.
      when: >-
        not vikunja_redis_socket_enabled and
        vikunja_redis_hostname | string | length == 0

- name: Fail if SMTP settings are missing (and SMTP is enabled by setting host)
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`) to correctly set up email via SMTP.
  when: "vikunja_mailer_enabled | bool and lookup('vars', item, default='') | string | length == 0"
  with_items:
    - vikunja_environment_variables_smtp_host
    - vikunja_environment_variables_smtp_from

- name: Fail if Typesense settings for Vikunja are missing (and Typesense is enabled by setting host)
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`) to enable Typesense integration.
  when: "vikunja_environment_variables_typesense_enabled | bool and lookup('vars', item, default='') | string | length == 0"
  with_items:
    - vikunja_environment_variables_typesense_url
    - vikunja_environment_variables_typesense_apikey

- name: Run if Traefik is enabled
  when: vikunja_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for Vikunja are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - vikunja_container_labels_traefik_hostname
        - vikunja_container_labels_traefik_path_prefix

    - name: Fail if vikunja_container_labels_traefik_path_prefix is different than /
      ansible.builtin.fail:
        msg: >-
          vikunja_container_labels_traefik_path_prefix (`{{ vikunja_container_labels_traefik_path_prefix }}`) must be `/`.
          Vikunja does not support hosting under a subpath yet.
      when: "vikunja_container_labels_traefik_path_prefix != '/'"

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `vikunja_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if vikunja_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          vikunja_container_labels_traefik_path_prefix (`{{ vikunja_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/vikunja`).
      when: "vikunja_container_labels_traefik_path_prefix != '/' and vikunja_container_labels_traefik_path_prefix[-1] == '/'"
